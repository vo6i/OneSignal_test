<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Jokes Push Service</title>
    <!-- ИСПРАВЛЕНО: Подключаем правильный скрипт OneSignal SDK -->
    <script src="https://onesignal.com" defer></script>
   
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 40px 20px; background: #f4f6f8; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { font-size: 1.5rem; margin-bottom: 10px; color: #e60023; }
        button { background: #e60023; color: white; border: none; padding: 14px 28px; font-size: 1rem; border-radius: 25px; cursor: pointer; font-weight: bold; margin-top: 20px; transition: 0.2s; width: 100%; }
        button:hover { background: #b6001a; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .joke-preview { background: #f9f9f9; padding: 15px; border-radius: 8px; font-style: italic; margin-top: 15px; border-left: 4px solid #e60023; text-align: left; font-size: 0.95rem; white-space: pre-line; }
    </style>
</head>
<body>

<div class="container">
    <h1>IT-Уведомления а-ля Pinterest</h1>
    <p>Подпишитесь, чтобы получать системные пуши с шутками в Chrome или Firefox.</p>
   
    <button id="subscribe-btn">Загрузка сервиса...</button>

    <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">

    <h3>Панель управления (Отправить пуш всем)</h3>
    <p>Кнопка ниже спарсит свежую шутку и мгновенно отправит её в пуш-уведомление всем, кто подписался.</p>
    <button id="send-push-btn" disabled>Парсить и разослать шутку</button>
    <div id="joke-view" class="joke-preview" style="display: none;"></div>
</div>

<script>
// Инициализируем OneSignal при загрузке страницы
window.OneSignalDeferred = window.OneSignalDeferred || [];
window.OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
        appId: "d9140035-fa41-4933-bec4-05b2e0b0c1db",
      safari_web_id: "web.onesignal.auto.2e21fe47-8329-4413-bae9-ecef4da3342d",
      notifyButton: {
        enable: false,
      },
    });
    const subBtn = document.getElementById('subscribe-btn');
    const sendBtn = document.getElementById('send-push-btn');

    function updateUI() {
        if (OneSignal.User.PushSubscription.optedIn) {
            subBtn.textContent = "Вы успешно подписаны! 🎉";
            subBtn.disabled = true;
            sendBtn.disabled = false; 
        } else {
            subBtn.textContent = "Разрешить уведомления";
            subBtn.disabled = false;
            sendBtn.disabled = true;
        }
    }

    // Проверяем статус сразу
    updateUI();

    subBtn.addEventListener('click', async () => {
        await OneSignal.Slidedown.promptPush();
    });

    // Следим за изменением подписки
    OneSignal.User.PushSubscription.addEventListener("change", (event) => {
        updateUI();
    });
});

// Функция парсинга шутки и отправки её через OneSignal REST API
document.getElementById('send-push-btn').addEventListener('click', async () => {
    const sendBtn = document.getElementById('send-push-btn');
    const jokeView = document.getElementById('joke-view');
    sendBtn.disabled = true;
    sendBtn.textContent = 'Парсинг шутки...';

    try {
        // 1. Парсим шутку (исправлен URL на рабочий анонимный эндпоинт шуток)
        const response = await fetch('https://jokeapi.dev');
        const data = await response.json();
        const jokeText = data.type === 'single' ? data.joke : `${data.setup} \n— ${data.delivery}`;
       
        jokeView.style.display = 'block';
        jokeView.textContent = `Отправлено: "${jokeText}"`;

        // 2. ИСПРАВЛЕНО: Отправляем запрос на ПРАВИЛЬНЫЙ URL API OneSignal
        const pushResponse = await fetch('https://onesignal.com/api/v1/notifications', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                // ВНИМАНИЕ: Замените ВАШ_REST_API_KEY на ваш ключ, но перед пушем на GitHub сотрите его!
                'Authorization': 'Basic os_v2_app_3ekaanp2ifethpweawzobmgb3oe3xuypd32e6cm2ati6a3qfzftpek2qcbmgcgf2kx22ed6eotiwyibx3hvagkryjnjjgvdwa4rl3dy' 
            },
            body: JSON.stringify({
                app_id: "d9140035-fa41-4933-bec4-05b2e0b0c1db", // <- ВСТАВЬТЕ СЮДА СВОЙ ID
                included_segments: ["All Users"], 
                headings: {"en": "IT Шутка дня! 💻", "ru": "IT Шутка дня! 💻"},
                contents: {"en": jokeText, "ru": jokeText},
                url: window.location.href 
            })
        });

        if (!pushResponse.ok) {
            const errData = await pushResponse.json();
            throw new Error(errData.errors ? errData.errors[0] : 'Ошибка API');
        }

        alert('Шутка успешно улетела в фоновые уведомления браузера!');

    } catch (error) {
        console.error(error);
        alert('Ошибка: ' + error.message);
    } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = 'Парсить и разослать шутку';
    }
});
</script>

</body>
</html>
